name: IaC Security

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  # ── Checkov IaC scan ────────────────────────────────────────────────────────
  checkov:
    name: Checkov
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: github_failed_only
          soft_fail: false  # CRITICAL/HIGH findings block the PR
