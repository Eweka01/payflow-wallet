name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install --save-dev eslint @eslint/js globals

      - name: Run ESLint across all services
        run: |
          npx eslint "services/**/*.js" \
            --ignore-pattern "**/node_modules/**" \
            --ignore-pattern "**/coverage/**" \
            --max-warnings 0

  # ── SAST — SonarCloud ───────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so SonarCloud can track new vs existing issues

      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── SCA — Snyk dependency scan ──────────────────────────────────────────────
  snyk-deps:
    name: Snyk SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: snyk/actions/setup@master

      - name: Scan each service for vulnerable dependencies
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          for svc in \
            services/api-gateway \
            services/auth-service \
            services/wallet-service \
            services/transaction-service \
            services/notification-service \
            services/frontend; do
            echo "──── Scanning $svc ────"
            (cd "$svc" && npm install --no-save && snyk test --severity-threshold=high) || exit 1
          done
