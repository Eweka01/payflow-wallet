name: Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 470439679607.dkr.ecr.us-east-1.amazonaws.com
  ECR_PREFIX:   payflow-eks-cluster

jobs:
  # ── Build → Snyk container scan → ECR push (main only) ────────────────────
  build-scan-push:
    name: Build / Scan / Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for OIDC token exchange with AWS
      contents: read

    strategy:
      fail-fast: false  # let all services finish scanning even if one fails
      matrix:
        service:
          - api-gateway
          - auth-service
          - wallet-service
          - transaction-service
          - notification-service
          - frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the image and load it into the local Docker daemon for scanning.
      # Cache layers per-service so rebuilds are fast.
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/${{ matrix.service }}/Dockerfile
          load: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # Snyk scans the built image for OS and app-level CVEs.
      # CRITICAL/HIGH → fail the job. MEDIUM/LOW → warn only.
      - name: Snyk container scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          args: >-
            --severity-threshold=high
            --file=services/${{ matrix.service }}/Dockerfile

      # OIDC: exchange GitHub's JWT for temporary AWS credentials (no static keys).
      # Only runs on merge to main — PRs scan but never push.
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      # Tag with both the immutable SHA and mutable latest, then push both.
      - name: Push to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}
          docker tag  ${IMAGE}:${{ github.sha }} ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
          echo "Pushed ${IMAGE}:${{ github.sha }}"
