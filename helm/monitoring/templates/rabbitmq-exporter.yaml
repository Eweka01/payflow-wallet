---
# RABBIT_USER, RABBIT_PASSWORD, RABBIT_ENDPOINT come from rabbitmq-exporter-secret,
# created by ESO in the payflow Helm chart from payflow/dev/rabbitmq in Secrets Manager.
# Amazon MQ exposes the management API on port 15671 (HTTPS); port 15692 is not exposed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-exporter
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
    app: rabbitmq-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-exporter
  template:
    metadata:
      labels:
        app: rabbitmq-exporter
    spec:
      containers:
        - name: rabbitmq-exporter
          image: kbudde/rabbitmq-exporter:v0.29.0
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 9419
              name: metrics
          env:
            - name: RABBIT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-exporter-secret
                  key: RABBIT_USER
            - name: RABBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-exporter-secret
                  key: RABBIT_PASSWORD
            - name: RABBIT_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-exporter-secret
                  key: RABBIT_ENDPOINT
            - name: RABBIT_URL
              value: "https://$(RABBIT_ENDPOINT):15671"
            - name: INSECURE_SKIP_VERIFY
              value: "true"
            - name: RABBIT_EXPORTERS
              value: "overview,exchange,node,queue,connections"
            - name: OUTPUT_FORMAT
              value: "TTY"
            - name: PUBLISH_PORT
              value: "9419"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9419
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9419
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-exporter
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
    app: rabbitmq-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9419
      targetPort: 9419
      protocol: TCP
      name: metrics
  selector:
    app: rabbitmq-exporter
