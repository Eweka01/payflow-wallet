---
# Custom queries expose PayFlow-specific business metrics:
# transactions by status, oldest pending age, total pending amount.
# Default collectors disabled — they time out on small clusters.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
data:
  queries.yaml: |
    pg_transactions_by_status:
      query: "SELECT status, COUNT(*) as count FROM transactions GROUP BY status"
      metrics:
        - status:
            usage: "LABEL"
            description: "Transaction status"
        - count:
            usage: "GAUGE"
            description: "Number of transactions by status"

    pg_oldest_pending_transaction:
      query: "SELECT COALESCE(EXTRACT(EPOCH FROM (NOW() - (SELECT MIN(created_at) FROM transactions WHERE status = 'PENDING'))), 0)::float AS age_seconds"
      metrics:
        - age_seconds:
            usage: "GAUGE"
            description: "Age of oldest pending transaction in seconds (0 if none)"

    pg_pending_transaction_amount:
      query: "SELECT COALESCE(SUM(amount), 0) as total_amount FROM transactions WHERE status = 'PENDING'"
      metrics:
        - total_amount:
            usage: "GAUGE"
            description: "Total amount stuck in pending transactions"

    pg_users_total:
      query: "SELECT COUNT(*)::float AS n FROM users"
      metrics:
        - n:
            usage: "GAUGE"
            description: "Registered users in database"

    pg_transactions_rowcount:
      query: "SELECT COUNT(*)::float AS n FROM transactions"
      metrics:
        - n:
            usage: "GAUGE"
            description: "Total transactions in database"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_PORT
            - name: DATA_SOURCE_URI
              value: "$(DB_HOST):$(DB_PORT)/payflow?sslmode=require"
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_PASSWORD
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: "/etc/postgres-exporter/queries.yaml"
            - name: PG_EXPORTER_DISABLE_DEFAULT_METRICS
              value: "true"
            - name: PG_EXPORTER_DISABLE_SETTINGS_METRICS
              value: "true"
          volumeMounts:
            - name: queries
              mountPath: /etc/postgres-exporter
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: queries
          configMap:
            name: postgres-exporter-queries
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
    app: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: 9187
      protocol: TCP
      name: metrics
  selector:
    app: postgres-exporter
