---
# REDIS_ADDR comes from redis-exporter-secret, created by ESO in the payflow Helm chart.
# Local dev: in-cluster redis address. EKS: ElastiCache endpoint from Secrets Manager.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.55.0
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 9121
              name: metrics
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: redis-exporter-secret
                  key: REDIS_ADDR
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9121
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: payflow
  labels:
    {{- include "payflow-monitoring.labels" . | nindent 4 }}
    app: redis-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9121
      targetPort: 9121
      protocol: TCP
      name: metrics
  selector:
    app: redis-exporter
