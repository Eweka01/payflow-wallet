apiVersion: v2
name: payflow-monitoring
description: Monitoring stack for PayFlow — Prometheus, Grafana, Loki, custom exporters
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: "65.1.1"
    repository: https://prometheus-community.github.io/helm-charts
    alias: prometheus

  - name: loki-stack
    version: "2.10.2"
    repository: https://grafana.github.io/helm-charts
    alias: loki
