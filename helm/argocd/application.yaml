# ArgoCD Application — tells ArgoCD what to deploy and where.
# Apply this once after ArgoCD is installed:
#   kubectl apply -f helm/argocd/application.yaml
#
# ArgoCD will then continuously sync the cluster to the state described
# in helm/payflow/ on the main branch, applying values-dev.yaml overrides.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payflow
  namespace: argocd
  # finalizer ensures ArgoCD deletes all managed resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Eweka01/payflow-wallet.git
    targetRevision: main
    path: helm/payflow
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: payflow

  syncPolicy:
    automated:
      prune: true       # Remove resources deleted from Git
      selfHeal: true    # Revert manual changes made directly on the cluster
    syncOptions:
      - CreateNamespace=true   # Create payflow namespace if it doesn't exist
      - ServerSideApply=true   # Use server-side apply for larger resources
