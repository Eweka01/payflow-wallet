apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Image Updater — watches api-gateway ECR repo as a proxy for all services.
    # All services are built and pushed with the same tag (date-SHA format).
    # When Image Updater sees a new tag it sets global.imageTag via Helm parameter
    # override — no git write-back commit, no Stage 4 in CI.
    argocd-image-updater.argoproj.io/image-list: "payflow=470439679607.dkr.ecr.us-east-1.amazonaws.com/payflow-eks-cluster/api-gateway"
    argocd-image-updater.argoproj.io/payflow.update-strategy: name
    argocd-image-updater.argoproj.io/payflow.allow-tags: "regexp:^[0-9]{14}-[0-9a-f]{7}$"
    argocd-image-updater.argoproj.io/payflow.helm.image-tag: global.imageTag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Eweka01/payflow-wallet.git
    targetRevision: main
    path: helm/payflow
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: payflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

  # Ignore fields managed by controllers so ArgoCD doesn't show false OutOfSync
  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
        - /spec/behavior
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # HPA manages this at runtime
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .status
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
