apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Eweka01/payflow-wallet.git
    targetRevision: main
    path: helm/payflow
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: payflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

  # Ignore fields managed by controllers so ArgoCD doesn't show false OutOfSync
  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
        - /spec/behavior
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # HPA manages this at runtime
