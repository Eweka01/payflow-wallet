apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payflow-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Eweka01/payflow-wallet.git
    targetRevision: main
    path: helm/monitoring
    helm:
      releaseName: payflow-monitoring
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates  # Immutable field; ArgoCD can't update it
