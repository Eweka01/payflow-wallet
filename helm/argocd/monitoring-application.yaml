apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payflow-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Eweka01/payflow-wallet.git
    targetRevision: main
    path: k8s/monitoring
    directory:
      exclude: alertmanager-external-secret.yaml   # no SM key yet; base config used

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
