apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: payflow
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
data:
  DB_NAME: {{ .Values.global.dbName | quote }}
  # RDS requires SSL; local dev overrides to disable
  PGSSLMODE: "require"
  # Internal Kubernetes DNS service URLs
  AUTH_SERVICE_URL: "http://auth-service:{{ (index .Values.services "auth-service").port }}"
  WALLET_SERVICE_URL: "http://wallet-service:{{ (index .Values.services "wallet-service").port }}"
  TRANSACTION_SERVICE_URL: "http://transaction-service:{{ (index .Values.services "transaction-service").port }}"
  NOTIFICATION_SERVICE_URL: "http://notification-service:{{ (index .Values.services "notification-service").port }}"
  # Empty = api-gateway reflects request Origin (required when credentials:true)
  CORS_ORIGIN: ""
