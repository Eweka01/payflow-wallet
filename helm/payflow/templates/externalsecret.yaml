{{- $env := .Values.externalSecrets.environment }}
{{- $interval := .Values.externalSecrets.refreshInterval }}
# ExternalSecret — ESO reads from Secrets Manager and writes a Kubernetes Secret named db-secrets.
# All backend services mount db-secrets via secretKeyRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secrets-external
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $interval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: password
    - secretKey: DB_HOST
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: port
    - secretKey: JWT_SECRET
      remoteRef:
        key: payflow/{{ $env }}/app/secrets
        property: jwt_secret
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: payflow/{{ $env }}/rabbitmq
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: payflow/{{ $env }}/redis
        property: url
