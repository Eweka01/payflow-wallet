{{- $env := .Values.externalSecrets.environment }}
{{- $interval := .Values.externalSecrets.refreshInterval }}
# ExternalSecret — ESO reads from Secrets Manager and writes a Kubernetes Secret named db-secrets.
# All backend services mount db-secrets via secretKeyRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secrets-external
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $interval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: password
    - secretKey: DB_HOST
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: payflow/{{ $env }}/rds
        property: port
    - secretKey: JWT_SECRET
      remoteRef:
        key: payflow/{{ $env }}/app/secrets
        property: jwt_secret
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: payflow/{{ $env }}/rabbitmq
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: payflow/{{ $env }}/redis
        property: url
---
# redis-exporter-secret: endpoint:port for redis-exporter Deployment in payflow namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-exporter-secret-external
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redis-exporter-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        REDIS_ADDR: '{{ .endpoint }}:{{ .port }}'
  data:
    - secretKey: endpoint
      remoteRef:
        key: payflow/{{ $env }}/redis
        property: endpoint
    - secretKey: port
      remoteRef:
        key: payflow/{{ $env }}/redis
        property: port
---
# rabbitmq-exporter-secret: credentials for rabbitmq-exporter Deployment in payflow namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-exporter-secret-external
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rabbitmq-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: RABBIT_USER
      remoteRef:
        key: payflow/{{ $env }}/rabbitmq
        property: username
    - secretKey: RABBIT_PASSWORD
      remoteRef:
        key: payflow/{{ $env }}/rabbitmq
        property: password
    - secretKey: RABBIT_ENDPOINT
      remoteRef:
        key: payflow/{{ $env }}/rabbitmq
        property: endpoint
