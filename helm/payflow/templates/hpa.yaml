{{- $services := list "api-gateway" "auth-service" "wallet-service" "transaction-service" "notification-service" "frontend" }}
{{- range $services }}
{{- $svc := . }}
{{- $cfg := index $.Values.services $svc }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svc }}-hpa
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    {{- include "payflow.labels" $ | nindent 4 }}
    app: {{ $svc }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svc }}
  minReplicas: {{ $cfg.hpa.min }}
  maxReplicas: {{ $cfg.hpa.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.hpa.cpuTarget }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $cfg.hpa.memTarget }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
---
{{- end }}
