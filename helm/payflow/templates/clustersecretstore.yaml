# ClusterSecretStore — tells ESO how to connect to AWS Secrets Manager.
# IRSA on the external-secrets ServiceAccount provides the IAM credentials.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region }}
