{{- $svc := "wallet-service" }}
{{- $cfg := index .Values.services $svc }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc }}
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
    app: {{ $svc }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app: {{ $svc }}
  template:
    metadata:
      labels:
        app: {{ $svc }}
        {{- include "payflow.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ $svc }}
          image: {{ include "payflow.image" (dict "service" $svc "Values" .Values) }}
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "payflow.securityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ $cfg.port }}
          env:
            {{- include "payflow.dbEnv" . | nindent 12 }}
            - name: PORT
              value: {{ $cfg.port | quote }}
            - name: NODE_ENV
              value: "production"
            - name: SERVICE_NAME
              value: {{ $svc | quote }}
            - name: CONTAINER_ENV
              value: "true"
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $cfg.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $cfg.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}
  namespace: payflow
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
    app: {{ $svc }}
spec:
  type: ClusterIP
  selector:
    app: {{ $svc }}
  ports:
    - protocol: TCP
      port: {{ $cfg.port }}
      targetPort: {{ $cfg.port }}
