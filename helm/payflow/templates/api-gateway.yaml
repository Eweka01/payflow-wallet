{{- $svc := "api-gateway" }}
{{- $cfg := index .Values.services $svc }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc }}
  namespace: payflow
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
    app: {{ $svc }}
spec:
  replicas: {{ $cfg.replicas }}
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: {{ $svc }}
  template:
    metadata:
      labels:
        app: {{ $svc }}
        {{- include "payflow.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ $svc }}
          image: {{ include "payflow.image" (dict "service" $svc "Values" .Values) }}
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "payflow.securityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ $cfg.port }}
          env:
            # Internal service URLs from ConfigMap
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_SERVICE_URL
            - name: WALLET_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WALLET_SERVICE_URL
            - name: TRANSACTION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TRANSACTION_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NOTIFICATION_SERVICE_URL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ORIGIN
                  optional: true
            # Credentials from ESO-managed Secret (REDIS_URL included via payflow.dbEnv below)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: JWT_SECRET
            {{- include "payflow.dbEnv" . | nindent 12 }}
            - name: NODE_ENV
              value: "production"
            - name: SERVICE_NAME
              value: {{ $svc | quote }}
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $cfg.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $cfg.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}
  namespace: payflow
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ $cfg.port | quote }}
    prometheus.io/path: "/metrics"
  labels:
    {{- include "payflow.labels" . | nindent 4 }}
    app: {{ $svc }}
spec:
  type: ClusterIP
  selector:
    app: {{ $svc }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: {{ $cfg.port }}
