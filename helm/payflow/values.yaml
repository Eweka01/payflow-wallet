# Default values — environment-specific overrides go in values-dev.yaml

# ALB Ingress — internet-facing Application Load Balancer with WAF
# The ALB Controller merges the two Ingress objects (api + frontend) into one ALB
# via group.name: payflow.
#
# wafArn:         get with: terraform -chdir=terraform/aws/spoke-vpc-eks output -raw waf_web_acl_arn
# certificateArn: get with: terraform -chdir=terraform/aws/spoke-vpc-eks output -raw acm_certificate_arn
#                 leave empty for HTTP-only (no TLS) — ALB will only listen on port 80
ingress:
  enabled: true
  wafArn: ""          # required — WAF Web ACL ARN from Terraform output
  certificateArn: ""  # optional — ACM cert ARN; leave empty for HTTP-only dev

# Postgres backup CronJob + PVC
backup:
  schedule: "0 2 * * *"          # daily at 2 AM UTC
  storageSize: 10Gi
  storageClassName: gp2           # EKS: gp2 or gp3 | local/minikube: microk8s-hostpath
global:
  environment: dev
  registry: 470439679607.dkr.ecr.us-east-1.amazonaws.com
  imagePrefix: payflow-eks-cluster
  imageTag: latest
  awsRegion: us-east-1
  dbName: payflow

# External Secrets Operator — pulls credentials from AWS Secrets Manager
externalSecrets:
  enabled: true
  region: us-east-1
  # Maps to the Secrets Manager path prefix: payflow/<env>/
  environment: dev
  refreshInterval: 5m

# Per-service configuration
# replicas, resources, hpa limits
services:
  api-gateway:
    port: 3000
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
    hpa:
      min: 2
      max: 10
      cpuTarget: 70
      memTarget: 80

  auth-service:
    port: 3004
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
    hpa:
      min: 2
      max: 8
      cpuTarget: 70
      memTarget: 80

  wallet-service:
    port: 3001
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
    hpa:
      min: 2
      max: 8
      cpuTarget: 70
      memTarget: 80

  transaction-service:
    port: 3002
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
    hpa:
      min: 2
      max: 10
      cpuTarget: 70
      memTarget: 80

  notification-service:
    port: 3003
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
    hpa:
      min: 2
      max: 6
      cpuTarget: 70
      memTarget: 80

  frontend:
    port: 80
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    hpa:
      min: 2
      max: 6
      cpuTarget: 70
      memTarget: 80
