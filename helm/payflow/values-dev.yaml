# EKS dev environment overrides
# Applied on top of values.yaml:
#   helm upgrade --install payflow helm/payflow -f helm/payflow/values-dev.yaml
#
# Reduces CPU requests and replica counts to fit within t3.large node capacity.
# Node capacity: 2 vCPU / 8GB RAM — 6 services × 200m cpu request = 1.2 vCPU, comfortable.

global:
  environment: dev
  # imageTag is managed by ArgoCD Image Updater — do not set manually here.
  # Image Updater watches ECR and sets global.imageTag via Helm parameter override
  # when a new tag (format: YYYYMMDDHHMMSS-<sha7>) appears.

externalSecrets:
  environment: dev  # Resolves to payflow/dev/ in Secrets Manager

# ALB Ingress — fill these from Terraform outputs after spinup:
#   WAF_ARN=$(terraform -chdir=terraform/aws/spoke-vpc-eks output -raw waf_web_acl_arn)
#   ACM_ARN=$(terraform -chdir=terraform/aws/spoke-vpc-eks output -raw acm_certificate_arn 2>/dev/null || echo "")
#   Then update this file with those values and commit.
ingress:
  enabled: true
  wafArn: "arn:aws:wafv2:us-east-1:470439679607:regional/webacl/payflow-dev-waf/6b0928f5-e234-4785-95b7-ee47982ccbef"
  certificateArn: ""  # No ACM cert provisioned — ALB serves HTTP only
